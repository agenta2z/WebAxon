<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 16px; }
h2 { color: #58a6ff; font-size: 16px; margin-bottom: 12px; }
label { display: block; margin-bottom: 4px; color: #8b949e; font-size: 12px; }
input, select { width: 100%; padding: 8px; margin-bottom: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 13px; }
button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
button:hover { background: #2ea043; }
button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.status { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
.status.success { display: block; background: #0d2818; border: 1px solid #238636; color: #3fb950; }
.status.error { display: block; background: #2d1117; border: 1px solid #f85149; color: #f85149; }
.status.info { display: block; background: #1c2333; border: 1px solid #1f6feb; color: #58a6ff; }
.cookie-count { font-size: 11px; color: #8b949e; margin-top: 4px; }
</style>
</head>
<body>
<h2>🔐 WebAxon Cookie Export</h2>

<label>Sidecar URL</label>
<input type="text" id="sidecarUrl" value="http://localhost:18800" placeholder="http://localhost:18800">

<label>Session ID</label>
<input type="text" id="sessionId" placeholder="Paste session ID from WebAxon">

<label>Token</label>
<input type="text" id="token" placeholder="Paste auth token from WebAxon">

<label>Cookie Domain (leave empty for current tab's domain)</label>
<input type="text" id="domain" placeholder="e.g., hello.atlassian.net">

<button id="exportBtn" onclick="exportCookies()">Export Cookies</button>
<div class="cookie-count" id="cookieCount"></div>
<div class="status" id="statusBox"></div>

<script src="popup.js"></script>
</body>
</html>
